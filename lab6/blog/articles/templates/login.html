<!DOCTYPE html>
<html>
<head>
    <title>Вход</title>
    {% load static %}
    {% load url from future %}
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body class="login-page">
    <div class="header">
        <img src="{% static 'img/fg.png' %}" alt="Logo" />
    </div>
    <div class="form-container">
        <h1>Вход</h1>
        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label for="username">Имя пользователя:</label>
                <input type="text" name="username" id="username" value="{{ username|default:'' }}" required>
            </div>
            <div class="field">
                <label for="password">Пароль:</label>
                <input type="password" name="password" id="password" required>
            </div>
            {% if errors %}
                <div class="errors">
                    <ul>
                        {% for error in errors %}
                            <li>{{ error }}</li>
                        {% endfor %}
                    </ul>
                </div>
            {% endif %}
            <div class="submit">
                <input type="submit" value="Войти">
            </div>
        </form>
        <p>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрируйтесь</a></p>
    </div>
</body>
</html>
